case_id: "login_admin"
case_name: "admin 登录流程"
case_type: "admin-main"
description: "打开 admin 登录页，输入环境变量中的账号密码并提交。"
mode: web
defaults:
  step_timeout_ms: 20000
  wait_for_network: true
sessions:
  - name: admin
    login_url: "${env.ADMIN_LOGIN_URL}"
    username: "${env.ADMIN_USERNAME}"
    password: "${env.ADMIN_PASSWORD}"
locations:
  file: "cases/location/login.admin.yaml"
steps:
  - step_id: admin_open_login
    name: admin 打开登录页
    type: web_open
    session: admin
    url: "${session.login_url}"
  - step_id: admin_login
    name: admin 登录
    type: flow_login
    session: admin
    username: "${session.username}"
    password: "${session.password}"
  - step_id: admin_assert_home_visible
    name: admin 登录后页面可见
    type: web_assert_visible
    session: admin
    target: admin_home_marker
    continue_on_failure: true
