case_id: "admin_zilkiaoxiugai002"
case_name: "admin 修改资料002"
case_type: "admin-mian"
mode: web
defaults:
  step_timeout_ms: 20000
  wait_for_network: true
sessions:
  - name: admin
    login_url: ${env.ADMIN_LOGIN_URL}
    username: ${env.ADMIN_USERNAME}
    password: ${env.ADMIN_PASSWORD}
locations:
  file: cases/location/login.admin.yaml
steps:
  - step_id: open_login_page
    name: 打开管理员登录页
    type: web_open
    session: admin
    url: ${session.login_url}
  - step_id: admin_login
    name: 管理员登录
    type: flow_login
    session: admin
    username: ${session.username}
    password: ${session.password}
  - step_id: open_personal_info
    name: 打开个人信息编辑页
    type: web_open
    session: admin
    url: ${session.login_url}#/admin/sys/perinfo
  - step_id: input_new_username
    name: 输入新用户名称
    type: web_input
    session: admin
    target: admin_profile_username
    value: test_admin_updated
  - step_id: input_new_password
    name: 输入新登录密码
    type: web_input
    session: admin
    target: admin_profile_password
    value: NewSecurePass123!
  - step_id: upload_avatar
    name: 上传头像
    type: web_upload
    session: admin
    target: admin_avatar_upload
    file: uploads/cases/admin_zilkiaoxiugai002/favicon.png
  - step_id: click_save
    name: 点击保存按钮
    type: web_click
    session: admin
    target: admin_profile_save
    wait_for_api:
      method: POST
      url: /user/baseInfo/edit
      expected_status: 200
      business_code_path: code
      success_codes:
        - "0000"
      success:
        body_path: code
        equals: "0000"
  - step_id: assert_save_success
    name: 断言保存成功提示
    type: web_assert_text
    session: admin
    expected: 修改成功
    target: admin_profile_success_message
