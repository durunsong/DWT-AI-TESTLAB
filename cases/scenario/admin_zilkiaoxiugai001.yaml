case_id: "admin_zilkiaoxiugai001"
case_name: "admin 修改资料001"
case_type: "admin-mian"
description: "http://localhost:5173/admin/#/admin/sys/perinfo 页面编辑个人信息--个人资料"
mode: web
defaults:
  step_timeout_ms: 20000
  wait_for_network: true
sessions:
  - name: admin
    login_url: ${env.ADMIN_LOGIN_URL}
    username: ${env.ADMIN_USERNAME}
    password: ${env.ADMIN_PASSWORD}
locations:
  file: cases/location/login.admin.yaml
steps:
  - step_id: open_perinfo_page
    name: 打开个人信息页面
    type: web_open
    session: admin
    url: ${session.login_url}#/admin/sys/perinfo
    wait_for_network: true
  - step_id: admin_flow_login
    name: admin 登录
    type: flow_login
    session: admin
    username: ${session.username}
    password: ${session.password}
    wait_for_network: true
  - step_id: input_new_username
    name: 修改用户名称
    type: web_input
    session: admin
    target: admin_profile_username
    value: test_admin_updated
    wait_for_network: true
  - step_id: input_password
    name: 输入登录密码
    type: web_input
    session: admin
    target: admin_profile_password
    value: ${env.ADMIN_PASSWORD}
    wait_for_network: true
  - step_id: upload_avatar
    name: 上传头像
    type: web_upload
    session: admin
    target: admin_avatar_upload
    file: uploads/cases/admin_zilkiaoxiugai001/111.png
    wait_for_network: true
  - step_id: click_save
    name: 点击保存按钮
    type: web_click
    session: admin
    target: admin_profile_save
    wait_for_network: true
    wait_for_api:
      method: POST
      url: /user/baseInfo/edit
      expected_status: 200
      business_code_path: code
      success_codes:
        - "0000"
      success:
        body_path: code
        equals: "0000"
  - step_id: assert_success_message
    name: 断言保存成功提示
    type: web_assert_text
    session: admin
    expected: 修改成功
    target: admin_profile_success_message
